<script>
    //Incremento de variable
    var a = 23;
    a = a +5;
    a += 5;

    // operador de asignacion compuesto 
    // suma ( += ), resta( -= ), producto( *= ), division( /= ), modulo ( %= )

    // ejemplo con la suma
    var valorDeVenta = 48.99;
    valorDeVenta += 3;

    console.log("esta es la suma "+valorDeVenta);

    // ejemplo con la resta
    var b = 33;

    b = b - 3 ;
    b -= 3;
    console.log("esta es la resta "+b);


    // ejemplo con el producto

    var k = 7;
    k = k * 2;
    k *= 2 ;
    console.log("esta es el producto "+k);

    // ejemplo con la division y modulo
    var division=89;

    division = division / 5;

    division /= 5;

    console.log("el resultado de la division es "+division)

    // modulo
    var modulo =82;

    modulo %= 2;

    console.log("el modulo de 82 % 2 es : "+modulo);
</script>
