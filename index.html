<script>

    // Operaciones Aritmeticas en JS

    // suma 
    var suma = 7 + 8;
    console.log("la suma es "+suma);

    // resta 
    var resta = 7 - 8;
    console.log("la suma es "+resta);
    // producto
    var producto = 7 * 8;
    console.log("la suma es "+producto);

    // division 
    var division = 7 / 8;
    console.log("la suma es "+division);

    //modulo 
    var modulo = 7 % 8;
    console.log("la suma es "+modulo);

    // las divisiones entre cero como no estan definidas
    // en JS retorna el resultado como Infinity osea que es infinito


    console.log("Operaciones aritmeticas ");
</script>
